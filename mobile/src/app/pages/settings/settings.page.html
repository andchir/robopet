<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title i18n="@@settings.title">Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-input
        i18n-label="@@settings.robot-name"
        label="Robot name"
        labelPlacement="stacked"
        type="text"
        [(ngModel)]="robotName"
        placeholder="RoboPet">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-select
        i18n-label="@@settings.language"
        label="Language"
        labelPlacement="stacked"
        [(ngModel)]="ttsLang">
        <ion-select-option value="en-US">English</ion-select-option>
        <ion-select-option value="ru-RU">Русский</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-select
        i18n-label="@@settings.camera"
        label="Camera"
        labelPlacement="stacked"
        [(ngModel)]="cameraPosition">
        <ion-select-option value="front" i18n="@@settings.camera-front">Front</ion-select-option>
        <ion-select-option value="rear" i18n="@@settings.camera-rear">Rear</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-select
        i18n-label="@@settings.stt-mode"
        label="Voice recognition mode"
        labelPlacement="stacked"
        [(ngModel)]="sttMode">
        <ion-select-option value="whisper" i18n="@@settings.stt-mode-whisper">Whisper AI (offline)</ion-select-option>
        <ion-select-option value="native" i18n="@@settings.stt-mode-native">Google Speech (Android)</ion-select-option>
        <ion-select-option value="capacitor" i18n="@@settings.stt-mode-capacitor">Native SpeechRecognizer (Android)</ion-select-option>
      </ion-select>
    </ion-item>
  </ion-list>

  <ion-list-header>
    <ion-label i18n="@@settings.llm-section">AI Assistant (OpenAI-compatible API)</ion-label>
  </ion-list-header>

  <ion-list>
    <ion-item>
      <ion-input
        i18n-label="@@settings.llm-base-url"
        label="Base URL"
        labelPlacement="stacked"
        type="url"
        [(ngModel)]="llmBaseUrl"
        placeholder="https://api.openai.com/v1">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        i18n-label="@@settings.llm-api-key"
        label="API Key"
        labelPlacement="stacked"
        type="password"
        [(ngModel)]="llmApiKey"
        placeholder="sk-...">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        i18n-label="@@settings.llm-model"
        label="Model"
        labelPlacement="stacked"
        type="text"
        [(ngModel)]="llmModelName"
        placeholder="gpt-4o-mini">
      </ion-input>
    </ion-item>
  </ion-list>

  <div class="ion-padding-top">
    <ion-button expand="block" (click)="save()" i18n="@@settings.save">
      Save
    </ion-button>
  </div>

  <ion-list class="ion-margin-top">
    <ion-item>
      <ion-input
        i18n-label="@@settings.device-id"
        label="Device ID"
        labelPlacement="stacked"
        type="text"
        [value]="deviceId"
        readonly>
      </ion-input>
    </ion-item>
  </ion-list>
</ion-content>
