<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Настройки</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item>
      <ion-input
        label="IP сервера"
        labelPlacement="stacked"
        type="text"
        [(ngModel)]="serverHost"
        placeholder="192.168.1.100"
        (ionBlur)="save()">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-input
        label="Порт"
        labelPlacement="stacked"
        type="number"
        [(ngModel)]="serverPort"
        placeholder="8000"
        (ionBlur)="save()">
      </ion-input>
    </ion-item>

    <ion-item>
      <ion-select
        label="Камера"
        labelPlacement="stacked"
        [(ngModel)]="cameraPosition"
        (ionChange)="save()">
        <ion-select-option value="front">Фронтальная</ion-select-option>
        <ion-select-option value="rear">Основная</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-select
        label="Язык TTS"
        labelPlacement="stacked"
        [(ngModel)]="ttsLang"
        (ionChange)="save()">
        <ion-select-option value="ru-RU">Русский</ion-select-option>
        <ion-select-option value="en-US">English</ion-select-option>
      </ion-select>
    </ion-item>
  </ion-list>
</ion-content>
