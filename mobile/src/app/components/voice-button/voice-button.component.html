<ion-button
  expand="block"
  shape="round"
  size="large"
  [color]="(isRecording$ | async) ? 'danger' : 'primary'"
  (touchstart)="onPress()"
  (touchend)="onRelease()"
  (mousedown)="onPress()"
  (mouseup)="onRelease()">
  <ion-icon slot="icon-only" [name]="(isRecording$ | async) ? 'mic' : 'mic-outline'"></ion-icon>
</ion-button>
